---
dirs:
- .
fileExtensions:
- md
useGitIgnore: true
ignorePatterns:
- pattern: '^mailto:'
- pattern: 'http://127.0.0.1:8000'  # This points to the locally served site
- pattern: '.*\.excalidraw$'  # Rendered client-side, not resolvable as link targets
- pattern: '.*\.kde\.org/.*'  # Returns 403 to automated requests
- pattern: '^https://www\.freedesktop\.org/.*'  # Returns 418 to automated requests
- pattern: '^https://reddit\.com/.*'  # Returns 403 in CI
timeout: 10000
retryCount: 3
